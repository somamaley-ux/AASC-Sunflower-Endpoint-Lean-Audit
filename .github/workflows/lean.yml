name: Lean audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lean-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/leanprover/elan/master/elan-init.ps1 -OutFile elan-init.ps1
          powershell -ExecutionPolicy Bypass -File elan-init.ps1 -y
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Sunflower A+ audit
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\check-sunflower-a-plus-audit.ps1
