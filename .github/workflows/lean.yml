name: Lean audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lean-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Lean audit surface
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $prohibitedPattern = "^\s*(axiom|unsafe)\b|\b(sorry|admit)\b"
          $scanRoots = @("SunflowerAASC", "Checks\Axiom")
          $leanFiles = foreach ($root in $scanRoots) {
            Get-ChildItem -LiteralPath $root -Recurse -Filter "*.lean" -File
          }
          $matches = @(
            $leanFiles |
            Select-String -Pattern $prohibitedPattern |
            ForEach-Object { "$($_.Path):$($_.LineNumber):$($_.Line)" }
          )
          if ($matches.Count -gt 0) {
            $matches | ForEach-Object { Write-Host $_ }
            throw "Prohibited Lean placeholder or escape found in Sunflower audit surface."
          }
          Write-Host "No live prohibited declarations or placeholders found in Sunflower audit surface."

      - name: Prepare short Lake dependency path
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".lake\p" | Out-Null
          $target = (Resolve-Path ".lake\p").Path
          New-Item -ItemType Junction -Path ".lake\packages" -Target $target | Out-Null

      - name: Build Lean audit
        uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
