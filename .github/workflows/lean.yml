name: Lean audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lean-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/leanprover/elan/master/elan-init.ps1 -OutFile elan-init.ps1
          .\elan-init.ps1 -NoPrompt 1 -DefaultToolchain none
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $elanBin = "$env:USERPROFILE\.elan\bin"
          $env:PATH = "$elanBin;$env:PATH"
          $elanBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          elan --version
          lake --version

      - name: Run Sunflower A+ audit
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\check-sunflower-a-plus-audit.ps1
